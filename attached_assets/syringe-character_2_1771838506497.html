<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syri – AI Chat Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #F7F9FC;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito Sans', sans-serif;
    background-image: radial-gradient(circle at 20% 20%, #e6ecff 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #e2f5ec 0%, transparent 50%);
    gap: 24px;
    padding: 40px 20px;
  }

  .title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2.2rem;
    color: #1a2e52;
    letter-spacing: -0.5px;
  }
  .title span { color: #2A52BE; }

  .character-container {
    animation: float 3s ease-in-out infinite;
    cursor: pointer;
    filter: drop-shadow(0 12px 24px rgba(42, 82, 190, 0.18));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-14px) rotate(2deg); }
  }

  .character-container:hover {
    filter: drop-shadow(0 18px 32px rgba(42, 82, 190, 0.3));
  }

  @keyframes wiggle {
    0% { transform: rotate(-2deg) scale(1); }
    20% { transform: rotate(-12deg) scale(1.08); }
    40% { transform: rotate(8deg) scale(1.08); }
    60% { transform: rotate(-6deg) scale(1.05); }
    80% { transform: rotate(4deg) scale(1.02); }
    100% { transform: rotate(-2deg) scale(1); }
  }

  .character-container.wiggling {
    animation: wiggle 0.5s ease-in-out forwards;
  }

  .speech-bubble {
    background: white;
    border-radius: 20px;
    padding: 16px 24px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    color: #1a2e52;
    box-shadow: 0 4px 20px rgba(42,82,190,0.1);
    position: relative;
    max-width: 280px;
    text-align: center;
    border: 2.5px solid #d8e2ff;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -17px;
    left: 50%;
    transform: translateX(-50%);
    border: 10px solid transparent;
    border-top-color: white;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -21px;
    left: 50%;
    transform: translateX(-50%);
    border: 12px solid transparent;
    border-top-color: #d8e2ff;
  }

  .tag {
    background: #2A52BE;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    padding: 6px 18px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(42,82,190,0.28);
  }

  .hint {
    font-size: 0.85rem;
    color: #8a9abf;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="title">Meet <span>Syri</span> 💉</div>

<div class="speech-bubble">
  Hey! I'm Syri, your AI health buddy! 🌟<br>
  <span style="font-size:0.88rem; font-weight:600; color:#5a7cc4">Click me to say hi!</span>
</div>

<div class="character-container" id="syri">
<svg width="200" height="320" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">

  <!-- SHADOW -->
  <ellipse cx="100" cy="312" rx="55" ry="9" fill="rgba(42,82,190,0.1)"/>

  <!-- BARREL (white base, royal blue outline) -->
  <rect x="52" y="100" width="96" height="130" rx="22" fill="white" stroke="#2A52BE" stroke-width="3.5"/>
  <!-- Inner soft tint -->
  <rect x="60" y="110" width="28" height="112" rx="13" fill="#eef1fc" opacity="0.6"/>

  <!-- Measurement marks (blue) -->
  <rect x="116" y="124" width="19" height="3" rx="1.5" fill="#2A52BE" opacity="0.3"/>
  <rect x="116" y="139" width="14" height="3" rx="1.5" fill="#2A52BE" opacity="0.22"/>
  <rect x="116" y="154" width="19" height="3" rx="1.5" fill="#2A52BE" opacity="0.3"/>
  <rect x="116" y="169" width="14" height="3" rx="1.5" fill="#2A52BE" opacity="0.22"/>
  <rect x="116" y="184" width="19" height="3" rx="1.5" fill="#2A52BE" opacity="0.3"/>
  <rect x="116" y="199" width="14" height="3" rx="1.5" fill="#2A52BE" opacity="0.22"/>

  <!-- LIQUID (green accent) -->
  <rect x="60" y="164" width="80" height="58" rx="9" fill="#E8F8EF"/>
  <rect x="60" y="164" width="80" height="58" rx="9" fill="none" stroke="#34A853" stroke-width="1.8" opacity="0.5"/>
  <!-- Bubbles -->
  <circle cx="88" cy="183" r="5" fill="white" stroke="#34A853" stroke-width="1.8"/>
  <circle cx="104" cy="194" r="3.5" fill="white" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="118" cy="178" r="4" fill="white" stroke="#34A853" stroke-width="1.5"/>

  <!-- PLUNGER FLANGE (royal blue) -->
  <rect x="62" y="88" width="76" height="18" rx="9" fill="#2A52BE"/>
  <rect x="68" y="92" width="30" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>

  <!-- PLUNGER ROD -->
  <rect x="90" y="50" width="20" height="46" rx="8" fill="#2A52BE"/>
  <rect x="94" y="54" width="7" height="30" rx="3.5" fill="rgba(255,255,255,0.18)"/>

  <!-- PLUNGER TOP CAP -->
  <rect x="78" y="40" width="44" height="18" rx="9" fill="#2A52BE"/>
  <rect x="84" y="44" width="16" height="10" rx="5" fill="rgba(255,255,255,0.28)"/>

  <!-- NEEDLE COLLAR (blue) -->
  <rect x="88" y="228" width="24" height="20" rx="5" fill="#2A52BE"/>

  <!-- NEEDLE SHAFT (light blue/white) -->
  <rect x="95" y="247" width="10" height="36" rx="4" fill="#dce6ff"/>
  <rect x="97" y="250" width="3" height="28" rx="1.5" fill="rgba(255,255,255,0.75)"/>

  <!-- NEEDLE TIP -->
  <ellipse cx="100" cy="285" rx="5" ry="7" fill="#b0c0ef"/>

  <!-- ── FACE ── -->
  <!-- Eye whites with blue outline -->
  <ellipse cx="82" cy="140" rx="16" ry="17" fill="white" stroke="#2A52BE" stroke-width="2.2"/>
  <ellipse cx="118" cy="140" rx="16" ry="17" fill="white" stroke="#2A52BE" stroke-width="2.2"/>
  <!-- Pupils (royal blue) -->
  <circle cx="84" cy="141" r="9" fill="#2A52BE"/>
  <circle cx="120" cy="141" r="9" fill="#2A52BE"/>
  <!-- Shines -->
  <circle cx="87" cy="137" r="3.5" fill="white"/>
  <circle cx="123" cy="137" r="3.5" fill="white"/>
  <circle cx="83" cy="145" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="119" cy="145" r="1.5" fill="rgba(255,255,255,0.5)"/>

  <!-- Eyebrows -->
  <path d="M70 125 Q82 119 94 125" stroke="#2A52BE" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M106 125 Q118 119 130 125" stroke="#2A52BE" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Smile -->
  <path d="M84 163 Q100 176 116 163" stroke="#1a2e52" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Cheeks (green tint) -->
  <ellipse cx="70" cy="159" rx="10" ry="7" fill="#34A853" opacity="0.15"/>
  <ellipse cx="130" cy="159" rx="10" ry="7" fill="#34A853" opacity="0.15"/>

  <!-- ARMS (white + blue outline) -->
  <ellipse cx="38" cy="148" rx="16" ry="11" fill="white" stroke="#2A52BE" stroke-width="2.5" transform="rotate(-30 38 148)"/>
  <circle cx="27" cy="158" r="11" fill="white" stroke="#2A52BE" stroke-width="2.5"/>
  <circle cx="22" cy="160" r="6" fill="#eef1fc"/>

  <ellipse cx="162" cy="148" rx="16" ry="11" fill="white" stroke="#2A52BE" stroke-width="2.5" transform="rotate(30 162 148)"/>
  <circle cx="173" cy="158" r="11" fill="white" stroke="#2A52BE" stroke-width="2.5"/>
  <circle cx="178" cy="160" r="6" fill="#eef1fc"/>

  <!-- Sparkles -->
  <path d="M22 100 L24 94 L26 100 L32 102 L26 104 L24 110 L22 104 L16 102 Z" fill="#2A52BE" opacity="0.7"/>
  <path d="M165 85 L167 80 L169 85 L174 87 L169 89 L167 94 L165 89 L160 87 Z" fill="#34A853" opacity="0.8"/>
  <path d="M35 76 L36.5 72 L38 76 L42 77.5 L38 79 L36.5 83 L35 79 L31 77.5 Z" fill="#2A52BE" opacity="0.35"/>

  <!-- Cross on barrel (green) -->
  <rect x="91" y="116" width="18" height="5" rx="2.5" fill="#34A853" opacity="0.55"/>
  <rect x="97" y="110" width="5" height="18" rx="2.5" fill="#34A853" opacity="0.55"/>

</svg>
</div>

<div class="tag">AI Chat Assistant</div>
<div class="hint">Hover & click Syri to interact ✨</div>

<script>
  const syri = document.getElementById('syri');
  syri.addEventListener('click', () => {
    syri.classList.remove('wiggling');
    void syri.offsetWidth;
    syri.classList.add('wiggling');
    syri.addEventListener('animationend', () => syri.classList.remove('wiggling'), { once: true });
  });
</script>

</body>
</html>
